<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Git Tamagotchi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lcd: #c6d6b8;
      --lcd-dark: #3a4a32;
      --shell: #f4a8c0;
      --shell-2: #e87fa0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'DotGothic16', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 筐体 */
    .shell {
      width: 200px; height: 240px;
      margin: 8px auto;
      background: radial-gradient(circle at 35% 25%, var(--shell), var(--shell-2));
      border-radius: 50% 50% 46% 46% / 56% 56% 44% 44%;
      box-shadow:
        inset -6px -8px 16px rgba(0,0,0,.25),
        inset 6px 8px 14px rgba(255,255,255,.35),
        0 8px 18px rgba(0,0,0,.30);
      position: relative;  /* care-alert-wrap の基準 */
      -webkit-app-region: drag;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 22px;
      transition: background .4s ease;
    }
    body.plant    .shell { --shell: #9fd6a0; --shell-2: #5fae66; }
    body.cat      .shell { --shell: #f5c8a0; --shell-2: #c89060; }
    body.slime    .shell { --shell: #88ddcc; --shell-2: #44aa88; }
    body.mushroom .shell { --shell: #e8a898; --shell-2: #c05848; }

    /* 液晶画面 */
    .screen {
      width: 150px; height: 140px;
      background: var(--lcd);
      border-radius: 10px;
      border: 4px solid #2a2a2a;
      box-shadow: inset 0 0 0 2px #8fa080, inset 0 4px 10px rgba(0,0,0,.18);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .screen::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
      pointer-events: none;
    }

    .char {
      width: 44px; height: 44px;
      font-size: 44px; line-height: 44px;
      display: flex; align-items: center; justify-content: center;
      filter: drop-shadow(1px 2px 0 rgba(0,0,0,.2));
      animation: bob 1.6s ease-in-out infinite;
    }
    .char > svg { display: block; width: 40px; height: 40px; flex-shrink: 0; }
    body.happy  .char { animation: hop  0.9s ease-in-out infinite; }
    body.hungry .char,
    body.sad    .char { animation: sway 2.4s ease-in-out infinite; opacity: .85; }
    @keyframes bob  { 0%,100%{ transform: translateY(0);}      50%{ transform: translateY(-6px);} }
    @keyframes hop  { 0%,100%{ transform: translateY(0) scale(1);} 30%{ transform: translateY(-12px) scale(1.05);} 60%{ transform: translateY(0) scale(.97);} }
    @keyframes sway { 0%,100%{ transform: rotate(-4deg);}      50%{ transform: rotate(4deg);} }

    /* お世話アラート（スクリーン上端から降りてくる） */
    .care-alert-wrap {
      position: absolute;
      top: 22px; left: 25px;
      width: 150px; height: 20px;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }
    .care-alert {
      width: 100%;
      background: rgba(180,90,10,.88);
      color: #fff;
      font-size: 9px;
      text-align: center;
      padding: 3px 0;
      border-radius: 0 0 5px 5px;
      transform: translateY(-100%);
      transition: transform .35s cubic-bezier(.2,.8,.4,1);
    }
    .care-alert.show { transform: translateY(0); }
    .care-alert.crit {
      background: rgba(180,20,10,.92);
      animation: pulse-alert .8s ease-in-out infinite;
    }
    @keyframes pulse-alert { 0%,100%{ opacity:1; } 50%{ opacity:.55; } }

    /* ユーザー設定のシェルカラー（柄のあとに定義して優先） */
    body .shell[data-shell-color="pink"]   { --shell: #f4a8c0; --shell-2: #e87fa0; }
    body .shell[data-shell-color="yellow"] { --shell: #f8e870; --shell-2: #e0c040; }
    body .shell[data-shell-color="sky"]    { --shell: #a8d8f4; --shell-2: #70a8e0; }
    body .shell[data-shell-color="green"]  { --shell: #a8e8a8; --shell-2: #70c070; }
    body .shell[data-shell-color="purple"] { --shell: #d0a8f0; --shell-2: #a870d8; }
    body .shell[data-shell-color="orange"] { --shell: #f4c070; --shell-2: #e09030; }
    body .shell[data-shell-color="white"]  { --shell: #f4f0ec; --shell-2: #d8d4d0; }
    body .shell[data-shell-color="navy"]   { --shell: #7090c0; --shell-2: #405888; }

    /* シェルの柄（パターンを上層、ベースグラデーションを下層に配置） */
    .shell[data-shell-pattern="dots"] {
      background:
        radial-gradient(circle, rgba(255,255,255,.38) 3px, transparent 3px) 0 0 / 12px 12px,
        radial-gradient(circle at 35% 25%, var(--shell), var(--shell-2));
    }
    .shell[data-shell-pattern="stripes"] {
      background:
        repeating-linear-gradient(45deg,
          rgba(255,255,255,.20) 0px, rgba(255,255,255,.20) 3px,
          transparent 3px, transparent 10px),
        radial-gradient(circle at 35% 25%, var(--shell), var(--shell-2));
    }
    .shell[data-shell-pattern="check"] {
      background:
        repeating-linear-gradient(0deg,
          transparent 0px, transparent 6px,
          rgba(255,255,255,.18) 6px, rgba(255,255,255,.18) 7px),
        repeating-linear-gradient(90deg,
          transparent 0px, transparent 6px,
          rgba(255,255,255,.18) 6px, rgba(255,255,255,.18) 7px),
        radial-gradient(circle at 35% 25%, var(--shell), var(--shell-2));
    }

    /* ステータスバー */
    .status {
      width: 150px; margin-top: 8px; color: #4a2a36;
      font-size: 10px; text-align: center;
    }
    body.plant .status { color: #234a28; }
    .row { display: flex; justify-content: space-between; padding: 0 4px; }
    .bar {
      height: 7px; margin: 4px 0; border-radius: 4px;
      background: rgba(255,255,255,.5); overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2);
    }
    .bar > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd35a, #ff8a3d);
      transition: width .6s ease;
    }

    /* ボタン列 */
    .buttons { margin-top: 6px; display: flex; gap: 10px; -webkit-app-region: no-drag; }
    .btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 12px;
      background: #2a2a2a; color: #fff;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }

    .hint { font-size: 9px; color: var(--lcd-dark); opacity: .7; margin-top: 3px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="care-alert-wrap">
      <div class="care-alert" id="care-alert"></div>
    </div>
    <div class="screen">
      <div class="char" id="char">🥚</div>
    </div>
    <div class="status">
      <div class="row"><span id="stage">起動中</span><span id="streak"></span></div>
      <div class="bar"><i id="progress"></i></div>
      <div class="row"><span id="score"></span><span id="next"></span></div>
    </div>
    <div class="buttons">
      <button class="btn" id="refresh" title="更新">↻</button>
      <button class="btn" id="settings" title="GitHubで見る">@</button>
      <button class="btn" id="reset" title="最初からやり直す">🥚</button>
      <button class="btn" id="help" title="お世話ガイド">?</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
  <script src="characters.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
