<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Git Tamagotchi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lcd: #c6d6b8;       /* 液晶の地色 */
      --lcd-dark: #3a4a32;  /* ドットの濃色 */
      --shell: #f4a8c0;     /* 筐体カラー（ペット時） */
      --shell-2: #e87fa0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'DotGothic16', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 筐体（卵型の本体） */
    .shell {
      width: 200px; height: 240px;
      margin: 8px auto;
      background: radial-gradient(circle at 35% 25%, var(--shell), var(--shell-2));
      border-radius: 50% 50% 46% 46% / 56% 56% 44% 44%;
      box-shadow:
        inset -6px -8px 16px rgba(0,0,0,.25),
        inset 6px 8px 14px rgba(255,255,255,.35),
        0 8px 18px rgba(0,0,0,.30);
      position: relative;
      -webkit-app-region: drag;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 26px;
      transition: background .4s ease;
    }
    body.plant .shell { --shell: #9fd6a0; --shell-2: #5fae66; }

    /* 液晶画面 */
    .screen {
      width: 150px; height: 132px;
      background: var(--lcd);
      border-radius: 10px;
      border: 4px solid #2a2a2a;
      box-shadow: inset 0 0 0 2px #8fa080, inset 0 4px 10px rgba(0,0,0,.18);
      position: relative;
      overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* 液晶のドット格子 */
    .screen::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 1px, transparent 1px 3px);
      pointer-events: none;
    }

    .char {
      font-size: 52px; line-height: 1;
      filter: drop-shadow(1px 2px 0 rgba(0,0,0,.2));
      animation: bob 1.6s ease-in-out infinite;
    }
    body.happy .char { animation: hop 0.9s ease-in-out infinite; }
    body.hungry .char, body.sad .char { animation: sway 2.4s ease-in-out infinite; opacity: .85; }
    @keyframes bob { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-6px);} }
    @keyframes hop { 0%,100%{ transform: translateY(0) scale(1);} 30%{ transform: translateY(-12px) scale(1.05);} 60%{ transform: translateY(0) scale(.97);} }
    @keyframes sway { 0%,100%{ transform: rotate(-4deg);} 50%{ transform: rotate(4deg);} }

    .face { font-size: 14px; margin-top: 6px; color: var(--lcd-dark); }
    .name { font-size: 12px; color: var(--lcd-dark); margin-top: 2px; }

    /* ステータスバー（筐体下部） */
    .status {
      width: 150px; margin-top: 10px; color: #4a2a36;
      font-size: 10px; text-align: center;
    }
    body.plant .status { color: #234a28; }
    .row { display: flex; justify-content: space-between; padding: 0 4px; }
    .bar {
      height: 7px; margin: 5px 0; border-radius: 4px;
      background: rgba(255,255,255,.5); overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.2);
    }
    .bar > i {
      display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffd35a, #ff8a3d);
      transition: width .6s ease;
    }

    /* ボタン列 */
    .buttons { margin-top: 8px; display: flex; gap: 14px; -webkit-app-region: no-drag; }
    .btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: none; cursor: pointer; font-size: 12px;
      background: #2a2a2a; color: #fff;
      box-shadow: 0 3px 0 rgba(0,0,0,.3);
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }

    .hint { font-size: 9px; color: var(--lcd-dark); opacity: .7; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="screen">
      <div class="char" id="char">🥚</div>
      <div class="face" id="face">…</div>
      <div class="name" id="name"></div>
    </div>
    <div class="status">
      <div class="row"><span id="stage">起動中</span><span id="streak"></span></div>
      <div class="bar"><i id="progress"></i></div>
      <div class="row"><span id="score"></span><span id="next"></span></div>
    </div>
    <div class="buttons">
      <button class="btn" id="refresh" title="更新">↻</button>
      <button class="btn" id="settings" title="GitHubで見る">@</button>
    </div>
    <div class="hint" id="hint"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
