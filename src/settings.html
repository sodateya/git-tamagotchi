<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>設定 — Git Tamagotchi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
      background: #1c1f24; color: #e8eaed; padding: 22px; font-size: 13px;
    }
    h1 { font-size: 16px; margin-bottom: 4px; }
    p.sub { color: #9aa0a6; margin-bottom: 18px; font-size: 12px; }
    label { display: block; margin: 14px 0 5px; font-weight: 600; }
    input[type=text], input[type=password] {
      width: 100%; padding: 9px 10px; border-radius: 8px;
      border: 1px solid #3a3f47; background: #11141a; color: #fff; font-size: 13px;
    }
    .kinds {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 4px;
    }
    .kinds label {
      text-align: center; padding: 10px 4px; border-radius: 10px;
      border: 2px solid #3a3f47; cursor: pointer; margin: 0; font-weight: 600;
      font-size: 11px; line-height: 1.3;
    }
    .kinds input { display: none; }
    .kinds input:checked + span { color: #6ad07d; }
    .kinds label:has(input:checked) { border-color: #6ad07d; background: #14241a; }
    .char-preview { font-size: 26px; display: block; margin-bottom: 4px; line-height: 1.1; }
    .char-preview svg { width: 28px; height: 28px; display: inline-block; }
    a { color: #6ab0ff; }
    .shell-colors { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .swatch {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .swatch.selected { border-color: #6ad07d; box-shadow: 0 0 0 2px #14241a; }
    .shell-patterns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .pattern-btn {
      padding: 5px 12px; border-radius: 8px;
      border: 2px solid #3a3f47; background: #11141a; color: #e8eaed;
      cursor: pointer; font-size: 12px;
    }
    .pattern-btn.selected { border-color: #6ad07d; background: #14241a; color: #6ad07d; }
    .slider-row {
      display: flex; align-items: center; gap: 10px; margin-top: 6px;
    }
    .slider-row input[type=range] {
      flex: 1; accent-color: #6ad07d; cursor: pointer; height: 4px;
    }
    .slider-val {
      font-size: 12px; color: #6ad07d; font-weight: 700;
      min-width: 40px; text-align: right;
    }
    .save {
      margin-top: 22px; width: 100%; padding: 11px; border: none; border-radius: 9px;
      background: #6ad07d; color: #0d1410; font-weight: 700; font-size: 14px; cursor: pointer;
    }
    .save:active { transform: translateY(1px); }
    .ok { color: #6ad07d; text-align: center; margin-top: 10px; height: 16px; }
    .help { font-size: 11px; color: #9aa0a6; margin-top: 5px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>Git Tamagotchi 設定</h1>
  <p class="sub">GitHubの活動でキャラが育ちます。1週間でどこまで育てられる？</p>

  <label>GitHub Personal Access Token</label>
  <input type="password" id="token" placeholder="ghp_... または github_pat_..." />
  <p class="help">
    必要な権限: <b>read:user</b>（fine-grained の場合は読み取り専用でOK）。<br />
    <a href="#" id="tokenLink">トークンを発行する →</a> ／ トークンはこのPC内にのみ保存されます。
  </p>

  <label>育てるキャラクター</label>
  <div class="kinds">
    <label>
      <input type="radio" name="kind" value="pet" checked />
      <span class="char-preview" id="prev-pet">🐣</span>
      <span>ひよこ</span>
    </label>
    <label>
      <input type="radio" name="kind" value="cat" />
      <span class="char-preview" id="prev-cat">🐱</span>
      <span>ねこ</span>
    </label>
    <label>
      <input type="radio" name="kind" value="slime" />
      <span class="char-preview" id="prev-slime">🟢</span>
      <span>スライム</span>
    </label>
    <label>
      <input type="radio" name="kind" value="plant" />
      <span class="char-preview" id="prev-plant">🌱</span>
      <span>植物</span>
    </label>
    <label>
      <input type="radio" name="kind" value="mushroom" />
      <span class="char-preview" id="prev-mushroom">🍄</span>
      <span>きのこ</span>
    </label>
  </div>

  <label>シェルのカラー</label>
  <div class="shell-colors" id="shell-colors">
    <button class="swatch" data-color="pink"   style="background:#f4a8c0" title="ピンク"></button>
    <button class="swatch" data-color="yellow" style="background:#f8e870" title="きいろ"></button>
    <button class="swatch" data-color="sky"    style="background:#a8d8f4" title="スカイ"></button>
    <button class="swatch" data-color="green"  style="background:#a8e8a8" title="みどり"></button>
    <button class="swatch" data-color="purple" style="background:#d0a8f0" title="むらさき"></button>
    <button class="swatch" data-color="orange" style="background:#f4c070" title="オレンジ"></button>
    <button class="swatch" data-color="white"  style="background:#f4f0ec" title="しろ"></button>
    <button class="swatch" data-color="navy"   style="background:#7090c0" title="こん"></button>
  </div>

  <label>シェルの柄</label>
  <div class="shell-patterns" id="shell-patterns">
    <button class="pattern-btn" data-pattern="solid">無地</button>
    <button class="pattern-btn" data-pattern="dots">水玉</button>
    <button class="pattern-btn" data-pattern="stripes">ストライプ</button>
    <button class="pattern-btn" data-pattern="check">チェック</button>
  </div>

  <label>ウィンドウサイズ</label>
  <div class="slider-row">
    <input type="range" id="windowScale" min="50" max="200" step="5" value="100" />
    <span class="slider-val" id="windowScaleVal">100%</span>
  </div>

  <label>透過度</label>
  <div class="slider-row">
    <input type="range" id="windowOpacity" min="20" max="100" step="5" value="100" />
    <span class="slider-val" id="windowOpacityVal">100%</span>
  </div>

  <label>名前（任意）</label>
  <input type="text" id="name" placeholder="空欄ならGitHub名を使用" />

  <button class="save" id="save">保存する</button>
  <div class="ok" id="ok"></div>

  <script src="characters.js"></script>
  <script src="settings.js"></script>
</body>
</html>
